<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #ffb300;
    --gold-light: #ffd54f;
    --gold-dim: #c68a00;
    --text-white: #f0e6cc;
    --glow-gold: 0 0 18px rgba(255,179,0,0.7), 0 0 40px rgba(255,179,0,0.35);
    --glow-hero: 0 0 40px rgba(255,179,0,0.3), 0 20px 60px rgba(0,0,0,0.6);
  }

  html, body {
    width: 100%; min-height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: #0a0608;
    background-image:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
      url('bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  /* Particle layer */
  .particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px 20px 12px;
    width: 100%;
    max-width: 900px;
    gap: 0;
  }

  /* Gold top rule */
  .rule {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 6px;
    animation: fadeIn 1s ease forwards;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: clamp(9px, 1.3vw, 12px);
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0;
    animation: slideDown 0.8s ease 0.2s forwards;
  }

  /* Headline */
  .headline {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 3.8vw, 46px);
    font-weight: 900;
    color: var(--text-white);
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    opacity: 0;
    animation: slideDown 0.8s ease 0.4s forwards;
  }
  .headline .gold {
    color: var(--gold);
    text-shadow: var(--glow-gold);
  }

  /* Subtext */
  .subtext {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(13px, 1.8vw, 18px);
    font-weight: 600;
    color: rgba(240,230,204,0.82);
    letter-spacing: 0.04em;
    max-width: 560px;
    line-height: 1.5;
    margin-bottom: 6px;
    opacity: 0;
    animation: slideDown 0.8s ease 0.6s forwards;
  }

  /* Hero image */
  .hero-wrap {
    position: relative;
    opacity: 0;
    animation: heroReveal 1s ease 0.8s forwards;
    margin-bottom: 6px;
    width: clamp(220px, 50vw, 580px);
    max-width: 580px;
  }
  .hero-frame {
    display: block;
    width: 100%;
    border-radius: 6px;
    border: 2px solid var(--gold);
    box-shadow:
      0 0 0 1px rgba(255,179,0,0.25),
      0 0 18px rgba(255,179,0,0.55),
      0 0 50px rgba(255,179,0,0.2),
      inset 0 0 0 1px rgba(255,220,80,0.15),
      0 20px 60px rgba(0,0,0,0.7);
    filter: brightness(1.04) contrast(1.02);
    transition: box-shadow 0.3s;
  }
  /* Corner accents */
  .hero-wrap::before,
  .hero-wrap::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
    z-index: 3;
    pointer-events: none;
  }
  .hero-wrap::before {
    top: -3px; left: -3px;
    border-width: 3px 0 0 3px;
    border-radius: 3px 0 0 0;
    box-shadow: -2px -2px 8px rgba(255,179,0,0.5);
  }
  .hero-wrap::after {
    top: -3px; right: -3px;
    border-width: 3px 3px 0 0;
    border-radius: 0 3px 0 0;
    box-shadow: 2px -2px 8px rgba(255,179,0,0.5);
  }
  .hero-corners-bottom {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .hero-corners-bottom::before,
  .hero-corners-bottom::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
  }
  .hero-corners-bottom::before {
    bottom: -3px; left: -3px;
    border-width: 0 0 3px 3px;
    border-radius: 0 0 0 3px;
    box-shadow: -2px 2px 8px rgba(255,179,0,0.5);
  }
  .hero-corners-bottom::after {
    bottom: -3px; right: -3px;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 3px 0;
    box-shadow: 2px 2px 8px rgba(255,179,0,0.5);
  }

  /* CTA — same width as hero */
  .cta-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.1s forwards;
    width: clamp(220px, 50vw, 580px);
    max-width: 580px;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 10px;
    background: linear-gradient(135deg, #c68a00 0%, #ffb300 45%, #ffe066 100%);
    color: #1a0e00;
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 1.6vw, 16px);
    font-weight: 900;
    letter-spacing: 0.08em;
    padding: clamp(13px, 1.8vw, 18px) 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255,179,0,0.5), 0 0 50px rgba(255,179,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
    animation: pulseCta 2.2s ease-in-out 1.5s infinite;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shimmer 2.8s ease-in-out 2s infinite;
  }
  .cta-btn:hover {
    background: linear-gradient(135deg, #e09c00 0%, #ffd54f 45%, #fff0a0 100%);
    box-shadow: 0 0 32px rgba(255,213,79,0.75), 0 0 70px rgba(255,213,79,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    transform: scale(1.04);
  }
  .cta-btn:active { transform: scale(0.98); }

  .cta-btn .play-icon {
    font-size: 1.15em;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.3));
  }

  .free-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(11px, 1.3vw, 13px);
    font-weight: 600;
    color: rgba(240,230,204,0.55);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Bottom rule */
  .rule-bottom {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,179,0,0.4), transparent);
    margin-top: 10px;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards;
  }

  /* Keyframes */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes heroReveal {
    from { opacity: 0; transform: scale(0.93) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes pulseCta {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,179,0,0.5), 0 0 50px rgba(255,179,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
    50%       { transform: scale(1.025); box-shadow: 0 0 30px rgba(255,179,0,0.7), 0 0 70px rgba(255,179,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }
  }
  @keyframes shimmer {
    0%   { left: -75%; }
    60%, 100% { left: 125%; }
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .headline { font-size: clamp(20px, 6.5vw, 30px); }
    .subtext  { font-size: 13px; max-width: 95%; }
    .hero-wrap, .cta-wrap { width: 92vw; max-width: 92vw; }
    .cta-btn  { font-size: 11px; }
  }

  /* Very short screens */
  @media (max-height: 600px) {
    .rule, .eyebrow { display: none; }
    .subtext { display: none; }
    .container { gap: 0; }
  }


  /* Game logo */
  .game-logo {
    display: block;
    width: clamp(140px, 22vw, 280px);
    max-width: 280px;
    height: auto;
    margin: 0 auto 2px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.1s forwards;
    filter: drop-shadow(0 0 16px rgba(255,179,0,0.6));
  }
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="container">
  <div class="rule"></div>

  <p class="eyebrow">⚔ Epic Fantasy Strategy ⚔</p>

  <h1 class="headline">
    Command <span class="gold">Dragons</span>.<br>Conquer Kingdoms.
  </h1>

  <p class="subtext">
    Build your empire, summon legendary heroes and lead powerful armies to victory in Infinity Kingdom.
  </p>

  <div class="hero-wrap">
    <img src="image1.png" alt="Infinity Kingdom Hero" class="hero-frame">
    <div class="hero-corners-bottom"></div>
  </div>


  <img src="https://live.ru.promo.cdn.101xp.com/lp_en_loc_en/ik/heroes/logo-game-DnZLeWwR.png" alt="Infinity Kingdom Logo" class="game-logo">

  <div class="cta-wrap">
    <a href="https://to.wendiro.com/u?k=9796a9a20d7f422080edbf4f9ee156e2&via=22457" class="cta-btn" id="cta-btn" target="_blank" rel="noopener">
      <span class="play-icon">▶</span>
      PLAY INFINITY KINGDOM NOW
    </a>
    <span class="free-label">Free to Play</span>
  </div>

  <div class="rule-bottom"></div>
</div>

<script>
  // Go2offer event on CTA click
  document.getElementById('cta-btn').addEventListener('click', function() {
    if(typeof fbq === 'function') fbq('trackCustom', 'Go2offer');
  });

  // Lightweight particle generator
  (function() {
    const container = document.getElementById('particles');
    const count = window.innerWidth < 600 ? 12 : 22;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1.5;
      p.style.cssText = [
        'width:' + size + 'px',
        'height:' + size + 'px',
        'left:' + (Math.random() * 100) + '%',
        'animation-duration:' + (Math.random() * 10 + 8) + 's',
        'animation-delay:' + (Math.random() * 10) + 's',
        'opacity:0'
      ].join(';');
      container.appendChild(p);
    }
  })();
</script>
</body>
